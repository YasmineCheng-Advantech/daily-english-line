name: 個人單字紀錄
description: 記錄從影片、Podcast、短影音等看到/聽到的英文單字或片語（可一次記多個）
title: "[單字紀錄] "
labels: ["vocab-note"]
body:
  - type: textarea
    id: words
    attributes:
      label: 單字或片語（一行一個，可一次記多個）
      description: 只要填英文就好，中文意思等資訊之後會自動補上
      placeholder: |
        serendipity
        ubiquitous
        streamline the process
    validations:
      required: true

  - type: dropdown
    id: source_type
    attributes:
      label: 來源類型
      options:
        - YouTube 影片
        - Podcast
        - 短影音（Reels / Shorts / TikTok）
        - 其他
    validations:
      required: true

  - type: input
    id: source_name
    attributes:
      label: 來源名稱（可留空）
      description: 影片標題、Podcast 節目名稱、頻道名稱等
      placeholder: 例如 The Daily Podcast EP123
    validations:
      required: false

  - type: input
    id: link
    attributes:
      label: 連結（可留空，填了之後可以回去重聽練聽力）
      placeholder: https://...
    validations:
      required: false

  - type: textarea
    id: note
    attributes:
      label: 備註（可留空，整批共用）
      description: 例如當時的上下文、為什麼記下這些字
    validations:
      required: false
