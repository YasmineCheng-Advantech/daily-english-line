name: Daily English Word Push

on:
  schedule:
    - cron: "17 0 * * *" # 每天 UTC 00:17 = 台灣時間 08:17（避開整點，減少 GitHub 排程壅塞延遲）
  workflow_dispatch:

permissions:
  contents: write

# 讓多次快速的手動加推排隊依序執行，避免同時 git push 撞車（non-fast-forward）
concurrency:
  group: daily-push
  cancel-in-progress: false

jobs:
  push-word:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily push
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          PUSH_TRIGGER: ${{ github.event_name }}
        run: python push.py

      - name: Retry enriching any pending personal notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/enrich_notes.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json docs/history.json notes.json docs/notes.json
          git diff --cached --quiet || git commit -m "chore: update data ($(date -u +%Y-%m-%d))"
          git push
