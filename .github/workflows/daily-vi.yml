name: Daily Vietnamese Word Push

on:
  schedule:
    - cron: "0 13 * * *" # 每天 UTC 13:00 = 台灣時間 21:00
  workflow_dispatch:

permissions:
  contents: write

# 跟英文推播共用同一個 concurrency group：兩支 workflow 都會 commit 同一份
# data/history.json，排隊依序執行才不會撞車（non-fast-forward）
concurrency:
  group: daily-push
  cancel-in-progress: false

jobs:
  push-word:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily Vietnamese push
        env:
          LINE_CHANNEL_ID: ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          PUSH_TRIGGER: ${{ github.event_name }}
        run: python push.py --lang vi

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json docs/history.json
          git diff --cached --quiet || git commit -m "chore: update Vietnamese data ($(date -u +%Y-%m-%d))"
          git push
