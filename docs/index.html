<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>每日商用英文單字回顧</title>
<style>
  :root {
    --bg: #f6f7fb;
    --card-bg: #ffffff;
    --text: #1c1e26;
    --muted: #6b7280;
    --accent: #2f6fed;
    --accent-soft: #e8effe;
    --border: #e5e7eb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14151c;
      --card-bg: #1d1f29;
      --text: #f0f1f5;
      --muted: #9096a6;
      --accent: #6d9bff;
      --accent-soft: #24304d;
      --border: #2c2f3a;
    }
  }
  /* 手動切換的主題優先權高於系統設定，讓使用者可以不管系統深色模式、自己選淺色或深色 */
  :root[data-theme="light"] {
    --bg: #f6f7fb;
    --card-bg: #ffffff;
    --text: #1c1e26;
    --muted: #6b7280;
    --accent: #2f6fed;
    --accent-soft: #e8effe;
    --border: #e5e7eb;
  }
  :root[data-theme="dark"] {
    --bg: #14151c;
    --card-bg: #1d1f29;
    --text: #f0f1f5;
    --muted: #9096a6;
    --accent: #6d9bff;
    --accent-soft: #24304d;
    --border: #2c2f3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header { margin-bottom: 24px; }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 0.9rem; }
  #themeToggle {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
  }
  #themeToggle:hover { filter: brightness(0.97); }

  .stats {
    display: flex;
    gap: 12px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .stat-tile {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    flex: 1;
    min-width: 100px;
  }
  .stat-tile .num { font-size: 1.4rem; font-weight: 700; }
  .stat-tile .label { font-size: 0.78rem; color: var(--muted); }

  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  input[type="search"],
  input[type="text"],
  input[type="url"],
  select,
  textarea {
    flex: 1;
    min-width: 180px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
  }
  input[type="search"]:focus,
  input[type="text"]:focus,
  input[type="url"]:focus,
  select:focus,
  textarea:focus { outline: 2px solid var(--accent); }
  .note-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .note-form button { align-self: flex-start; }
  .note-tag {
    font-size: 0.72rem;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 999px;
  }
  .note-link {
    font-size: 0.82rem;
    color: var(--accent);
  }
  button, a.btn {
    display: inline-block;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    font-size: 0.9rem;
    text-decoration: none;
  }
  button.primary, a.btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  button:hover, a.btn:hover { filter: brightness(0.97); }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .card .row1 {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .word { font-size: 1.15rem; font-weight: 700; }
  .pos {
    font-size: 0.75rem;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 8px;
  }
  .date { font-size: 0.78rem; color: var(--muted); }
  .meaning { margin-top: 6px; }
  .example {
    margin-top: 6px;
    color: var(--muted);
    font-style: italic;
    font-size: 0.92rem;
  }
  .word-row {
    padding-top: 12px;
    margin-top: 12px;
    border-top: 1px solid var(--border);
  }
  .word-row:first-of-type {
    padding-top: 0;
    margin-top: 10px;
    border-top: none;
  }

  #reviewCard { display: none; text-align: center; }
  #reviewCard .word { font-size: 1.8rem; }
  #reviewCard .reveal-btn { margin-top: 14px; }
  #reviewCard .hidden-part { display: none; margin-top: 10px; }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
  }
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .tabs button { flex: 1; }
  .tabs button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="header-row">
    <div>
      <h1>📘 每日商用英文單字回顧</h1>
      <div class="subtitle">資料來源：history.json（每日 LINE 推播紀錄）</div>
    </div>
    <button id="themeToggle" aria-label="切換淺色/深色主題">🌙 深色</button>
  </header>

  <div class="stats">
    <div class="stat-tile"><div class="num" id="statTotal">0</div><div class="label">累積單字數</div></div>
    <div class="stat-tile"><div class="num" id="statDays">0</div><div class="label">推播天數</div></div>
    <div class="stat-tile"><div class="num" id="statLatest">-</div><div class="label">最新一則日期</div></div>
  </div>

  <div class="card" id="todayPushCard" style="margin-bottom:20px;">
    <div id="todayPushStatus">檢查中…</div>
  </div>

  <div class="tabs">
    <button id="tabBrowse" class="active">瀏覽 / 搜尋</button>
    <button id="tabReview">隨機複習</button>
    <button id="tabNotes">個人紀錄</button>
  </div>

  <div id="browseView">
    <div class="controls">
      <input type="search" id="searchInput" placeholder="搜尋單字或中文意思…" />
      <button id="sortToggle">依日期：新→舊</button>
    </div>
    <div class="subtitle" id="browseHint" style="margin-bottom:12px;">預設顯示最新 3 天，輸入關鍵字可搜尋全部紀錄</div>
    <div id="list"></div>
  </div>

  <div id="reviewView" style="display:none;">
    <div class="tabs" id="reviewSourceTabs">
      <button id="sourceHistory" class="active">已推播過的</button>
      <button id="sourceBank">整個單字庫</button>
    </div>
    <div class="subtitle" id="reviewHint" style="margin-bottom:12px;">從最新 10 個推播過的字中隨機抽</div>
    <div class="card" id="reviewCard">
      <div class="date" id="reviewDate"></div>
      <div class="word" id="reviewWord">-</div>
      <span class="pos" id="reviewPos"></span>
      <div class="hidden-part" id="reviewHidden">
        <div class="meaning" id="reviewMeaning"></div>
        <div class="example" id="reviewExample"></div>
      </div>
      <div class="reveal-btn">
        <button class="primary" id="revealBtn">顯示意思與例句</button>
        <button id="nextBtn">換下一個</button>
        <button id="reshuffleBtn" style="display:none;">換一批新的 10 個</button>
      </div>
    </div>
    <div class="empty" id="reviewEmpty" style="display:none;">目前還沒有任何可以複習的單字。</div>
  </div>

  <div id="notesView" style="display:none;">
    <div class="card" style="margin-bottom:16px;">
      <div style="font-weight:700; margin-bottom:10px;">新增紀錄（可一次記多個）</div>
      <div class="subtitle" style="margin-bottom:10px;">只要填英文單字就好，中文意思等資訊之後會自動補上。填好按送出，會開啟預先填好的 GitHub Issue 頁面，登入後按「Submit new issue」確認即可。</div>
      <div class="note-form">
        <textarea id="noteWords" placeholder="單字或片語，一行一個（必填）&#10;例如：&#10;serendipity&#10;ubiquitous&#10;streamline the process" rows="4"></textarea>
        <select id="noteSourceType">
          <option value="YouTube 影片">YouTube 影片</option>
          <option value="Podcast">Podcast</option>
          <option value="短影音（Reels / Shorts / TikTok）">短影音（Reels / Shorts / TikTok）</option>
          <option value="其他">其他</option>
        </select>
        <input type="text" id="noteSourceName" placeholder="來源名稱（可留空）" />
        <input type="url" id="noteLink" placeholder="連結（可留空，填了之後可以回去重聽練聽力）" />
        <textarea id="noteNote" placeholder="備註（可留空，整批共用）" rows="2"></textarea>
        <button class="primary" id="noteSubmitBtn">📝 送出（開啟 GitHub Issue）</button>
      </div>
    </div>

    <div class="tabs" id="notesViewTabs">
      <button id="notesByWord" class="active">依單字</button>
      <button id="notesBySource">依來源</button>
    </div>

    <div id="notesByWordView">
      <div class="controls">
        <select id="noteFilter">
          <option value="">全部來源</option>
          <option value="youtube">YouTube 影片</option>
          <option value="podcast">Podcast</option>
          <option value="shorts">短影音</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div id="notesList"></div>
    </div>

    <div id="notesBySourceView" style="display:none;">
      <div id="notesSourceList"></div>
    </div>

    <div class="empty" id="notesEmpty" style="display:none;">目前還沒有任何個人紀錄。</div>
  </div>
</div>

<script>
// 主題切換：預設跟隨系統深色模式，使用者手動切換後改用 localStorage 記住的選擇
const THEME_KEY = 'daily-english-line-theme';
const themeToggle = document.getElementById('themeToggle');

function savedTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  return (saved === 'light' || saved === 'dark') ? saved : null;
}

function effectiveTheme() {
  return savedTheme() || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
}

function updateThemeToggleLabel() {
  themeToggle.textContent = effectiveTheme() === 'dark' ? '☀️ 淺色' : '🌙 深色';
}

const initialSavedTheme = savedTheme();
if (initialSavedTheme) document.documentElement.setAttribute('data-theme', initialSavedTheme);
updateThemeToggleLabel();

themeToggle.addEventListener('click', () => {
  const next = effectiveTheme() === 'dark' ? 'light' : 'dark';
  localStorage.setItem(THEME_KEY, next);
  document.documentElement.setAttribute('data-theme', next);
  updateThemeToggleLabel();
});

let historyData = [];
let wordsData = null; // null = 尚未載入完成；[] = 已載入但是空的
let wordsLoadingPromise = null;
let notesData = [];
let sortDesc = true;
let reviewSource = 'history'; // 'history' | 'bank'
let noteFilterValue = '';

const REPO_URL = 'https://github.com/YasmineCheng-Advantech/daily-english-line';

async function loadHistory() {
  try {
    const res = await fetch('./history.json', { cache: 'no-store' });
    historyData = await res.json();
  } catch (e) {
    historyData = [];
  }
  renderStats();
  renderList();
  renderTodayPushStatus();
  // words.json 比較大，不擋主要畫面渲染，背景先預載，等使用者切到「整個單字庫」時大機率已經載完
  ensureWordsLoaded();
  loadNotes();
}

async function loadNotes() {
  try {
    const res = await fetch('./notes.json', { cache: 'no-store' });
    notesData = await res.json();
  } catch (e) {
    notesData = [];
  }
  renderNotesList();
}

// 今日推播狀態：跟 push.py 的 today_taiwan() 邏輯一致，用台灣時間（UTC+8）判斷「今天」
const ACTIONS_URL = 'https://github.com/YasmineCheng-Advantech/daily-english-line/actions/workflows/daily.yml';

function todayTaiwanDateString() {
  // Date.getTime() 本身就是 UTC 為基準的絕對時間戳，不用再管訪客瀏覽器的當地時區，
  // 直接加 8 小時換算成台灣時間即可（跟訪客實際所在時區無關）
  const now = new Date();
  const taiwanMs = now.getTime() + 8 * 60 * 60000;
  const t = new Date(taiwanMs);
  const y = t.getUTCFullYear();
  const m = String(t.getUTCMonth() + 1).padStart(2, '0');
  const d = String(t.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function renderTodayPushStatus() {
  const el = document.getElementById('todayPushStatus');
  const today = todayTaiwanDateString();
  const todaysWords = historyData.filter(h => h.date === today);
  // 同一天可能有多組加推，用 pushed_at（舊資料退回 date）算今天推了幾組
  const todaysPushes = new Set(todaysWords.map(h => h.pushed_at || h.date)).size;

  if (todaysWords.length > 0) {
    el.innerHTML = `
      ✅ <strong>今天（${escapeHtml(today)}）已經推播 ${todaysPushes} 組</strong>
      <div class="subtitle" style="margin:6px 0;">${todaysWords.map(w => escapeHtml(w.word)).join('、')}</div>
      <div class="subtitle" style="margin:8px 0;">還想再多學一組？點下面按鈕開啟 GitHub Actions，登入後點「Run workflow」就會再加推一組新的字。</div>
      <a class="btn" href="${ACTIONS_URL}" target="_blank" rel="noopener">➕ 再加推一組</a>
    `;
  } else {
    el.innerHTML = `
      <div>今天（${escapeHtml(today)}）還沒有推播</div>
      <div class="subtitle" style="margin:8px 0;">點下面按鈕會開啟 GitHub Actions 頁面，登入後點選「Run workflow」即可手動觸發推播。之後想多學也可以再按，一次加推一組。</div>
      <a class="btn primary" href="${ACTIONS_URL}" target="_blank" rel="noopener">🚀 手動觸發推播</a>
    `;
  }
}

function ensureWordsLoaded() {
  if (wordsData !== null) return Promise.resolve(wordsData);
  if (!wordsLoadingPromise) {
    wordsLoadingPromise = fetch('./words.json', { cache: 'no-store' })
      .then(res => res.json())
      .then(data => { wordsData = data; return data; })
      .catch(() => { wordsData = []; return wordsData; });
  }
  return wordsLoadingPromise;
}

function renderStats() {
  document.getElementById('statTotal').textContent = historyData.length;
  const days = new Set(historyData.map(h => h.date)).size;
  document.getElementById('statDays').textContent = days;
  const latest = historyData.reduce((max, h) => (!max || h.date > max) ? h.date : max, null);
  document.getElementById('statLatest').textContent = latest || '-';
}

const MODE_LABELS = {
  theme: '主題',
  root: '字根字首字尾',
  synonym: '相似字',
  antonym: '反義字',
  random: '精選',
};

function latestNDatesSet(data, n) {
  const dates = Array.from(new Set(data.map(h => h.date))).sort();
  return new Set(dates.slice(-n));
}

function renderList() {
  const list = document.getElementById('list');
  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  const hint = document.getElementById('browseHint');
  let items;
  if (query) {
    items = historyData.filter(h =>
      h.word.toLowerCase().includes(query) ||
      (h.meaning || '').toLowerCase().includes(query)
    );
    hint.textContent = `搜尋全部紀錄中，符合 ${items.length} 筆`;
  } else {
    const latestDates = latestNDatesSet(historyData, 3);
    items = historyData.filter(h => latestDates.has(h.date));
    hint.textContent = '預設顯示最新 3 天，輸入關鍵字可搜尋全部紀錄';
  }

  if (items.length === 0) {
    list.innerHTML = '<div class="empty">找不到符合的單字，或尚無推播紀錄。</div>';
    return;
  }

  // 以「一組推播」為單位分卡片：優先用 pushed_at（同一天可能有多組加推），
  // 舊資料沒有 pushed_at 就退回用 date（過去一天只有一組）。保留原本陣列順序當同組內順序。
  const byPush = new Map();
  const order = [];
  for (const h of items) {
    const key = h.pushed_at || h.date;
    if (!byPush.has(key)) { byPush.set(key, []); order.push(key); }
    byPush.get(key).push(h);
  }

  order.sort((a, b) => sortDesc ? b.localeCompare(a) : a.localeCompare(b));

  list.innerHTML = order.map(key => {
    const group = byPush.get(key);
    const first = group[0];
    const modeLabel = MODE_LABELS[first.cluster_mode] || '';
    const keyLabel = first.cluster_key ? `${modeLabel} - ${escapeHtml(first.cluster_key)}` : modeLabel;
    // 標題顯示日期；若是同一天多組加推，附上時間（時:分）以區分
    const timePart = (first.pushed_at && first.pushed_at.length > 10) ? first.pushed_at.slice(11, 16) : '';
    const dateLabel = timePart ? `${first.date} ${timePart}` : first.date;

    const wordsHtml = group.map(h => `
      <div class="word-row">
        <div class="row1">
          <div><span class="word">${escapeHtml(h.word)}</span><span class="pos">${escapeHtml(h.pos || '')}</span></div>
        </div>
        <div class="meaning">${escapeHtml(h.meaning || '')}</div>
        <div class="example">${escapeHtml(h.example || '')}</div>
      </div>
    `).join('');

    return `
      <div class="card">
        <div class="row1">
          <div class="date">${escapeHtml(dateLabel)}</div>
          ${keyLabel ? `<span class="pos">${keyLabel}</span>` : ''}
        </div>
        ${wordsHtml}
      </div>
    `;
  }).join('');
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;');
}

document.getElementById('searchInput').addEventListener('input', renderList);
document.getElementById('sortToggle').addEventListener('click', () => {
  sortDesc = !sortDesc;
  document.getElementById('sortToggle').textContent = sortDesc ? '依日期：新→舊' : '依日期：舊→新';
  renderList();
});

// Tabs
const tabBrowse = document.getElementById('tabBrowse');
const tabReview = document.getElementById('tabReview');
const tabNotes = document.getElementById('tabNotes');
const browseView = document.getElementById('browseView');
const reviewView = document.getElementById('reviewView');
const notesView = document.getElementById('notesView');

function activateTab(tab) {
  for (const [btn, view] of [[tabBrowse, browseView], [tabReview, reviewView], [tabNotes, notesView]]) {
    const isActive = btn === tab.btn;
    btn.classList.toggle('active', isActive);
    view.style.display = isActive ? '' : 'none';
  }
}

tabBrowse.addEventListener('click', () => activateTab({ btn: tabBrowse }));
tabReview.addEventListener('click', () => {
  activateTab({ btn: tabReview });
  pickRandom();
});
tabNotes.addEventListener('click', () => activateTab({ btn: tabNotes }));

// Random review
let currentPick = null;
let bankReviewSample = null; // 每次切進「整個單字庫」時，隨機抽 10 個字當作這輪的複習範圍
const REVIEW_SAMPLE_SIZE = 10;

function sampleRandom(arr, n) {
  const copy = arr.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy.slice(0, n);
}

// 把個人紀錄轉成跟 words.json 一樣可以拿去顯示在複習卡片上的形狀（word/pos/meaning/example）
function notesAsReviewItems() {
  return notesData.map(n => ({
    word: n.word,
    pos: n.pos || '',
    meaning: n.meaning || '（個人紀錄，資訊補充中）',
    example: n.example || n.note || (n.source_name ? `來源：${n.source_name}` : '個人紀錄'),
  }));
}

const sourceHistoryBtn = document.getElementById('sourceHistory');
const sourceBankBtn = document.getElementById('sourceBank');
const reshuffleBtn = document.getElementById('reshuffleBtn');
const reviewHint = document.getElementById('reviewHint');

function updateReviewHint() {
  reviewHint.textContent = reviewSource === 'bank'
    ? '已從整個單字庫隨機抽出 10 個字複習'
    : '從最新 10 個推播過的字中隨機抽';
  reshuffleBtn.style.display = reviewSource === 'bank' ? '' : 'none';
}

sourceHistoryBtn.addEventListener('click', () => {
  reviewSource = 'history';
  sourceHistoryBtn.classList.add('active');
  sourceBankBtn.classList.remove('active');
  updateReviewHint();
  pickRandom();
});
sourceBankBtn.addEventListener('click', () => {
  reviewSource = 'bank';
  bankReviewSample = null; // 每次切進來都重新抽一批新的 10 個字
  sourceBankBtn.classList.add('active');
  sourceHistoryBtn.classList.remove('active');
  updateReviewHint();
  pickRandom();
});
reshuffleBtn.addEventListener('click', () => {
  bankReviewSample = null;
  pickRandom();
});

function pickRandom() {
  const card = document.getElementById('reviewCard');
  const empty = document.getElementById('reviewEmpty');

  if (reviewSource === 'bank' && wordsData === null) {
    card.style.display = 'none';
    empty.style.display = '';
    empty.textContent = '單字庫載入中…';
    ensureWordsLoaded().then(() => {
      if (reviewSource === 'bank') pickRandom(); // 載入完成時使用者可能已經切走，只在還在同個來源時才補渲染
    });
    return;
  }

  if (reviewSource === 'bank' && bankReviewSample === null) {
    bankReviewSample = sampleRandom(wordsData.concat(notesAsReviewItems()), REVIEW_SAMPLE_SIZE);
  }

  const pool = reviewSource === 'bank' ? bankReviewSample : historyData.slice(-REVIEW_SAMPLE_SIZE);

  if (pool.length === 0) {
    card.style.display = 'none';
    empty.style.display = '';
    empty.textContent = reviewSource === 'bank'
      ? '單字庫目前是空的。'
      : '目前還沒有任何推播紀錄可以複習。';
    return;
  }
  card.style.display = 'block';
  empty.style.display = 'none';

  currentPick = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById('reviewDate').textContent = reviewSource === 'bank'
    ? (currentPick.theme ? `主題：${currentPick.theme}` : '')
    : currentPick.date;
  document.getElementById('reviewWord').textContent = currentPick.word;
  document.getElementById('reviewPos').textContent = currentPick.pos || '';
  document.getElementById('reviewMeaning').textContent = currentPick.meaning || '';
  document.getElementById('reviewExample').textContent = currentPick.example || '';
  document.getElementById('reviewHidden').style.display = 'none';
  document.getElementById('revealBtn').textContent = '顯示意思與例句';
}

document.getElementById('revealBtn').addEventListener('click', () => {
  const hidden = document.getElementById('reviewHidden');
  const showing = hidden.style.display === 'block';
  hidden.style.display = showing ? 'none' : 'block';
  document.getElementById('revealBtn').textContent = showing ? '顯示意思與例句' : '隱藏';
});
document.getElementById('nextBtn').addEventListener('click', pickRandom);

// ---------------------------------------------------------------------------
// 個人紀錄
// ---------------------------------------------------------------------------

const SOURCE_TYPE_LABELS = {
  youtube: 'YouTube 影片',
  podcast: 'Podcast',
  shorts: '短影音',
  other: '其他',
};

function noteCardHtml(n) {
  const pending = !n.enriched;
  return `
    <div class="card">
      <div class="row1">
        <div><span class="word">${escapeHtml(n.word)}</span>${n.pos ? `<span class="pos">${escapeHtml(n.pos)}</span>` : ''}</div>
        <span class="note-tag">${escapeHtml(SOURCE_TYPE_LABELS[n.source_type] || '其他')}</span>
      </div>
      ${n.meaning ? `<div class="meaning">${escapeHtml(n.meaning)}</div>` : `<div class="subtitle" style="margin-top:6px;">⏳ 資訊補充中…</div>`}
      ${n.example ? `<div class="example">${escapeHtml(n.example)}</div>` : ''}
      ${n.source_name ? `<div class="subtitle" style="margin-top:4px;">來源：${escapeHtml(n.source_name)}</div>` : ''}
      ${n.link ? `<div style="margin-top:4px;"><a class="note-link" href="${escapeHtml(n.link)}" target="_blank" rel="noopener">${escapeHtml(n.link)}</a></div>` : ''}
      ${n.note ? `<div class="subtitle" style="margin-top:4px; font-style:italic;">${escapeHtml(n.note)}</div>` : ''}
      <div class="date" style="margin-top:6px;">${escapeHtml(n.date_added || '')}</div>
    </div>
  `;
}

function renderNotesList() {
  const list = document.getElementById('notesList');
  const empty = document.getElementById('notesEmpty');

  let items = notesData.slice();
  if (noteFilterValue) items = items.filter(n => n.source_type === noteFilterValue);
  items.sort((a, b) => (b.date_added || '').localeCompare(a.date_added || ''));

  empty.style.display = notesData.length === 0 ? '' : 'none';
  list.innerHTML = items.length === 0 ? '' : items.map(noteCardHtml).join('');
  renderNotesSourceList();
}

function renderNotesSourceList() {
  const container = document.getElementById('notesSourceList');
  // 以「來源」為單位分組：優先用連結當 key，沒連結就用來源名稱，都沒有就歸到「未標來源」
  const groups = new Map();
  for (const n of notesData) {
    const key = (n.link || '').trim() || (n.source_name || '').trim() || '__none__';
    if (!groups.has(key)) {
      groups.set(key, { link: (n.link || '').trim(), name: (n.source_name || '').trim(), type: n.source_type, words: [], latest: '' });
    }
    const g = groups.get(key);
    g.words.push(n.word);
    if ((n.date_added || '') > g.latest) g.latest = n.date_added || '';
  }

  const sorted = Array.from(groups.values()).sort((a, b) => b.latest.localeCompare(a.latest));
  container.innerHTML = sorted.map(g => `
    <div class="card">
      <div class="row1">
        <div style="font-weight:700;">${escapeHtml(g.name || (g.link ? g.link : '未標來源'))}</div>
        <span class="note-tag">${escapeHtml(SOURCE_TYPE_LABELS[g.type] || '其他')}</span>
      </div>
      <div class="subtitle" style="margin-top:4px;">記過 ${g.words.length} 個字：${g.words.map(escapeHtml).join('、')}</div>
      ${g.link ? `<div style="margin-top:8px;"><a class="btn" href="${escapeHtml(g.link)}" target="_blank" rel="noopener">🎧 回去重聽</a></div>` : ''}
    </div>
  `).join('');
}

document.getElementById('noteFilter').addEventListener('change', (e) => {
  noteFilterValue = e.target.value;
  renderNotesList();
});

// 個人紀錄子分頁：依單字 / 依來源
const notesByWordBtn = document.getElementById('notesByWord');
const notesBySourceBtn = document.getElementById('notesBySource');
const notesByWordView = document.getElementById('notesByWordView');
const notesBySourceView = document.getElementById('notesBySourceView');
notesByWordBtn.addEventListener('click', () => {
  notesByWordBtn.classList.add('active');
  notesBySourceBtn.classList.remove('active');
  notesByWordView.style.display = '';
  notesBySourceView.style.display = 'none';
});
notesBySourceBtn.addEventListener('click', () => {
  notesBySourceBtn.classList.add('active');
  notesByWordBtn.classList.remove('active');
  notesBySourceView.style.display = '';
  notesByWordView.style.display = 'none';
});

function buildNoteIssueUrl({ words, sourceType, sourceName, link, note }) {
  const params = new URLSearchParams();
  params.set('template', 'vocab-note.yml');
  const firstWord = words.split(/[\n,]+/).map(w => w.trim()).filter(Boolean)[0] || '單字紀錄';
  params.set('title', `[單字紀錄] ${firstWord}`);
  params.set('words', words);
  if (sourceType) params.set('source_type', sourceType);
  if (sourceName) params.set('source_name', sourceName);
  if (link) params.set('link', link);
  if (note) params.set('note', note);
  return `${REPO_URL}/issues/new?${params.toString()}`;
}

document.getElementById('noteSubmitBtn').addEventListener('click', () => {
  const words = document.getElementById('noteWords').value.trim();
  if (!words) {
    alert('請至少填一個單字或片語');
    return;
  }
  const url = buildNoteIssueUrl({
    words,
    sourceType: document.getElementById('noteSourceType').value,
    sourceName: document.getElementById('noteSourceName').value.trim(),
    link: document.getElementById('noteLink').value.trim(),
    note: document.getElementById('noteNote').value.trim(),
  });
  window.open(url, '_blank', 'noopener');
});

loadHistory();
